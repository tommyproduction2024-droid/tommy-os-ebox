DEFAULT tommyos
TIMEOUT 30
PROMPT 0
LABEL tommyos
	SAY Booting Tommy OS (External RAM Disk Mode)...
	KERNEL bzImage
	INITRD rootfs.cpio.gz
	APPEND console=tty1 nomodeset noapic nolapic acpi=off pci=conf1,realloc=off,nommconf,nomsi,noquirks libata.dma=0 ide-core.nodma=0.0 notsc clocksource=pit nousb random.trust_cpu=1 initcall_debug ignore_loglevel earlyprintk=vga init=/bin/sh
